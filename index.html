<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EMBW Toolkit</title>

  <link href="https://cdn.jsdelivr.net/npm/@tabler/core@latest/dist/css/tabler.min.css" rel="stylesheet"/>
</head>

<body data-bs-theme="dark">

<div class="page">

  <!-- ✅ TOP NAVBAR -->
  <header class="navbar navbar-expand-md navbar-dark d-print-none">
    <div class="container-xl">

      <!-- ✅ LOGO -->
      <h1 class="navbar-brand text-white">
        EMBW
      </h1>

      <!-- ✅ MENU TOGGLE (mobile) -->
      <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navbar-menu">
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- ✅ TOP MENU -->
      <div class="collapse navbar-collapse" id="navbar-menu">
        <div class="navbar-nav ms-auto">

          <a class="nav-link active" href="#">
            🏠 Dashboard
          </a>

          <a class="nav-link" href="#">
            🌐 Domain Lookup
          </a>

          <a class="nav-link" href="#">
            🌍 IP Lookup
          </a>

          <a class="nav-link" href="#">
            🚨 Risk Checker
          </a>

        </div>
      </div>
    </div>
  </header>

  <!-- ✅ PAGE CONTENT -->
  <div class="page-wrapper">

    <div class="page-header">
      <div class="container-xl">
        <h2 class="page-title">Security Toolkit</h2>
      </div>
    </div>

    <div class="page-body">
      <div class="container-xl">

        <div class="row g-4">

          <!-- TOOL CARD -->
          <div class="col-md-4">
            <div class="card card-sm">
              <div class="card-body">
                <h3 class="card-title">🌐 Domain Lookup</h3>
                <p>Perform DNS lookups and retrieve domain records.</p>
                <a href="#" class="btn btn-primary">Open Tool</a>
              </div>
            </div>
          </div>

          <!-- TOOL CARD -->
          <div class="col-md-4">
            <div class="card card-sm">
              <div class="card-body">
                <h3 class="card-title">🌍 IP Lookup</h3>
                <p>View geolocation, organisation and ASN data.</p>
                <a href="#" class="btn btn-primary">Open Tool</a>
              </div>
            </div>
          </div>

          <!-- TOOL CARD -->
          <div class="col-md-4">
            <div class="card card-sm">
              <div class="card-body">
                <h3 class="card-title">🚨 Risk Checker</h3>
                <p>Analyse sign-in risk using IP intelligence.</p>
                <a href="#" class="btn btn-danger">Open Tool</a>
              </div>
            </div>
          </div>

        </div>

      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tabler/core@latest/dist/js/tabler.min.js"></script>

</body>
</html>
